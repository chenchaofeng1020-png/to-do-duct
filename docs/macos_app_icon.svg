<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- macOS Big Sur+ 风格：圆角矩形 + 阴影 -->
  <defs>
    <!-- 背景渐变：米白色 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F9F9F9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EFEFEF;stop-opacity:1" />
    </linearGradient>
    
    <!-- 内部投影效果 -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
        <feOffset dx="0" dy="8" result="offsetblur"/>
        <feComponentTransfer>
            <feFuncA type="linear" slope="0.25"/>
        </feComponentTransfer>
        <feMerge> 
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/> 
        </feMerge>
    </filter>

    <!-- macOS 图标轮廓阴影 -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
        <feOffset dx="0" dy="10" result="offsetblur"/>
        <feComponentTransfer>
            <feFuncA type="linear" slope="0.4"/>
        </feComponentTransfer>
        <feMerge> 
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/> 
        </feMerge>
    </filter>

    <!-- 裁剪路径：macOS 风格圆角 -->
    <rect id="iconShape" x="100" y="100" width="824" height="824" rx="185" ry="185" />
  </defs>

  <!-- 整体容器 -->
  <g>
      <!-- 图标阴影背景 -->
      <use xlink:href="#iconShape" fill="black" filter="url(#iconShadow)" xmlns:xlink="http://www.w3.org/1999/xlink" opacity="0.3"/>
      
      <!-- 图标主体形状 -->
      <use xlink:href="#iconShape" fill="url(#bgGradient)" xmlns:xlink="http://www.w3.org/1999/xlink"/>
      
      <!-- 边框（可选，增加立体感） -->
      <use xlink:href="#iconShape" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.5" xmlns:xlink="http://www.w3.org/1999/xlink"/>
  </g>

  <!-- 图标内容 -->
  <g transform="translate(112, 112) scale(0.8)" filter="url(#dropShadow)">
  
    <!-- 1. 紫色对勾身体 (Checkmark Body) -->
    <!-- 起点：头部下方，底部圆润过渡，终点向右上扬起 -->
    <path d="M 350 600 Q 400 850 550 850 L 850 550" 
          stroke="#673AB7" 
          stroke-width="120" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none" />
          
    <!-- 2. 鸭头 (Head) -->
    <!-- 明亮但柔和的黄色圆形，位置偏上 -->
    <circle cx="400" cy="350" r="275" fill="#FFD54F"/>
    
    <!-- 3. 嘴巴 (Beak) -->
    <!-- 活力的橙色圆角矩形/椭圆，连接在头部右侧 -->
    <g transform="rotate(12, 620, 380)">
        <rect x="620" y="290" width="300" height="180" rx="90" ry="90" fill="#FFA726"/>
    </g>
    
    <!-- 4. 眼睛 (Eye) -->
    <circle cx="450" cy="320" r="60" fill="#000000" opacity="0.8"/>
    
  </g>
</svg>